media:
  input: assets
  output: /assets

content:
  # ------------------------------------------------------------
  #  Front-page / research intro paragraph
  # ------------------------------------------------------------
  - name: research_bio
    label: Research bio
    type: file
    path: data/research-bio.json
    format: json
    fields:
      - name: text
        label: Bio text
        type: text
        description: A short paragraph shown at the top of the Research page.

  # ------------------------------------------------------------
  #  Publications
  # ------------------------------------------------------------
  - name: publications
    label: Publications
    type: file
    path: data/publications.json
    format: json
    list: true
    view:
      fields: [year, title, journal]
      primary: title
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: type
        label: Type
        type: select
        options:
          values: [Article, Review]
        default: Article
      - name: year
        label: Year
        type: string
        description: A number, or "Forthcoming" or "Online first".
      - name: journal
        label: Journal
        type: string
      - name: volume
        label: Volume
        type: string
      - name: issue
        label: Issue
        type: string
      - name: pages
        label: Pages
        type: string
      - name: coauthors
        label: Co-authors
        type: string
      - name: abstract
        label: Abstract
        type: text
      - name: pdf
        label: PDF link
        type: string
      - name: doi
        label: Publisher / DOI link
        type: string
      - name: prize
        label: Prize / award
        type: string
        description: 'HTML allowed, e.g. Winner, <a href="#">Prize Name</a>.'

  # ------------------------------------------------------------
  #  Work in progress
  # ------------------------------------------------------------
  - name: wip
    label: Work in progress
    type: file
    path: data/wip.json
    format: json
    list: true
    view:
      fields: [status, title]
      primary: title
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: status
        label: Status
        type: select
        options:
          values: [Under review, In preparation]
        description: Papers are grouped under their status.
      - name: abstract
        label: Abstract
        type: text
      - name: pdf
        label: Draft PDF link
        type: string

  # ------------------------------------------------------------
  #  Talks
  # ------------------------------------------------------------
  - name: talks
    label: Talks
    type: file
    path: data/talks.json
    format: json
    list: true
    view:
      fields: [title]
      primary: title
    fields:
      - name: title
        label: Paper title
        type: string
        required: true
      - name: presentations
        label: Presentations
        type: object
        list: true
        fields:
          - name: type
            label: Type
            type: select
            options:
              values: [Invited, Peer-Review]
          - name: year
            label: Year
            type: string
          - name: month
            label: Month
            type: string
          - name: venue
            label: Venue / event
            type: string
          - name: institution
            label: Institution
            type: string
          - name: comment
            label: Comment
            type: string

  # ------------------------------------------------------------
  #  Teaching
  # ------------------------------------------------------------
  - name: teaching
    label: Teaching
    type: file
    path: data/teaching.json
    format: json
    list: true
    view:
      fields: [institution]
      primary: institution
    fields:
      - name: institution
        label: Institution
        type: string
        required: true
      - name: anchor
        label: Anchor (URL id)
        type: string
        description: Lowercase, no spaces. Used for in-page links.
      - name: entries
        label: Courses
        type: object
        list: true
        fields:
          - name: role
            label: Role
            type: string
          - name: course
            label: Course
            type: string
          - name: year
            label: Year
            type: string
          - name: note
            label: Note
            type: string

  # ------------------------------------------------------------
  #  Workshops
  # ------------------------------------------------------------
  - name: workshops
    label: Workshops
    type: file
    path: data/workshops.json
    format: json
    list: true
    view:
      fields: [title, year]
      primary: title
    fields:
      - name: id
        label: Page id
        type: string
        required: true
        description: Must match the page filename, e.g. "workshop-1".
      - name: title
        label: Title
        type: string
        required: true
      - name: institution
        label: Institution / venue
        type: string
      - name: month
        label: Month / dates
        type: string
      - name: year
        label: Year
        type: number
      - name: coorganisers
        label: Co-organisers
        type: string
      - name: description
        label: Description
        type: text
        description: Use a blank line between paragraphs.
      - name: registration
        label: Registration note
        type: string
      - name: programme
        label: Speakers
        type: object
        list: true
        fields:
          - name: speaker
            label: Speaker
            type: string
          - name: title
            label: Talk title
            type: string

  # ------------------------------------------------------------
  #  Navigation menus
  # ------------------------------------------------------------
  - name: nav
    label: Navigation menus
    type: file
    path: data/nav.json
    format: json
    fields:
      - name: workshops
        label: Workshops dropdown
        type: object
        list: true
        fields:
          - name: label
            label: Label
            type: string
          - name: href
            label: Page link
            type: string
      - name: teaching
        label: Teaching dropdown
        type: object
        list: true
        fields:
          - name: label
            label: Label
            type: string
          - name: href
            label: Page link
            type: string
